name: Notion Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0点 (北京时间早上8点) 运行
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r tools/notion_sync/requirements.txt

      - name: Run sync script
        env:
          PYTHONUNBUFFERED: "1"
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_FRAGMENTS_DATABASE_ID: ${{ secrets.NOTION_FRAGMENTS_DATABASE_ID }}
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET_NAME: ${{ secrets.QINIU_BUCKET_NAME }}
          QINIU_DOMAIN: ${{ secrets.QINIU_DOMAIN }}
        run: |
          python tools/notion_sync/sync.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add content/chinese/blog
          git add content/chinese/fragments
          git add static/images
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync content from Notion" && git push)
